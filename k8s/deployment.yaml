apiVersion: apps/v1
kind: Deployment
metadata:
  name: oficina-billing-service
  namespace: oficina
spec:
  replicas: 2
  selector:
    matchLabels:
      app: oficina-billing-service
  template:
    metadata:
      labels:
        app: oficina-billing-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /api/actuator/prometheus
        prometheus.io/port: "8082"
    spec:
      containers:
        - name: oficina-billing-service
          image: ghcr.io/ricartefelipe/oficina-billing-service:latest
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: oficina-billing-config
            - secretRef:
                name: oficina-billing-secrets
          readinessProbe:
            httpGet:
              path: /api/actuator/health/readiness
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/actuator/health/liveness
              port: 8082
            initialDelaySeconds: 40
            periodSeconds: 15
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: oficina-billing-service
  namespace: oficina
spec:
  selector:
    app: oficina-billing-service
  ports:
    - port: 8082
      targetPort: 8082
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: oficina-billing-config
  namespace: oficina
data:
  DB_URL: "jdbc:postgresql://postgres-billing:5432/oficina_billing"
  DB_USER: "oficina"
  RABBITMQ_HOST: "rabbitmq"
  RABBITMQ_PORT: "5672"
  RABBITMQ_USER: "guest"
  KEYCLOAK_ISSUER: "http://keycloak:8080/realms/oficina"
